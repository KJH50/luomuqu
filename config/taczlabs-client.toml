
[HUD]
	#New Crosshair of TaCZ:Labs.
	"Enable TaCZ:Labs Crosshair" = true
	#Real: Follows the actual firearm spread
	#Virtual: moving*2, sneaking*0.7, lying*0.5
	#Speed: Moving based on player speed, sneaking*0.7, lying*0.5
	#Allowed Values: REAL, VIRTUAL, SPEED
	"Spread Rules" = "REAL"
	#Max spread radius, range 0 ~ 50, default 30.
	#Range: 0 ~ 50
	"Crosshair Max Spread" = 30
	#Speed of crosshair anim. range 10 ~ 30, default 20.
	#Range: 10 ~ 30
	"Anim Speed" = 20
	#Magnitude of collimation spread according to the recoil at the time of firing, range 0 ~ 5, default 2.
	#Range: 0 ~ 10
	"Shooting Judder" = 5

	[HUD."Global Settings"]
		#Crosshair RGBA HEX color, format: 0xAARRGGBB.
		#Range: > -2147483648
		"Crosshair Color" = -429064340
		#Range: 0 ~ 255
		A = 230
		#Range: 0 ~ 255
		R = 108
		#Range: 0 ~ 255
		G = 255
		#Range: 0 ~ 255
		B = 108
		#Shadow alpha of crosshair, range 0 ~ 255, default 128.
		#Range: 0 ~ 255
		"Shadow Alpha" = 128
		#Shadow offset of crosshair, range 1 ~ 6, default 1 .
		#Range: 0 ~ 3
		"Shadow Offset" = 1

